<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>여행 가계부</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon.svg">
</head>
<body>
  <main>
    <section id="screen-dashboard" class="screen active">
      <h2>대시보드</h2>
    </section>
    <section id="screen-add-expense" class="screen">
      <h2>지출 추가</h2>
    </section>
    <section id="screen-expense-list" class="screen">
      <h2>지출 목록</h2>
    </section>
    <section id="screen-settings" class="screen">
      <h2>설정</h2>
    </section>
  </main>

  <div id="sync-loading" class="sync-loading-overlay" style="display:none">
    <div class="sync-loading-spinner"></div>
    <p>같이 보는 여행 불러오는 중...</p>
  </div>

  <div id="daterange-sheet" class="dp-overlay" style="display:none">
    <div class="dp-sheet">
      <div class="dp-sheet-header">
        <span class="dp-title">여행 기간 선택</span>
        <button type="button" class="ios-header-link" id="dp-close">닫기</button>
      </div>
      <div id="daterange-body"></div>
    </div>
  </div>

  <nav class="nav-bar">
    <button data-screen="dashboard" class="nav-btn active">
      <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10v9a1 1 0 0 0 1 1H9a1 1 0 0 0 1-1v-4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v4a1 1 0 0 0 1 1h2.5a1 1 0 0 0 1-1v-9"/></svg></span>대시보드
    </button>
    <button data-screen="expense-list" class="nav-btn">
      <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4.5" y="3.5" width="15" height="17" rx="2"/><path d="M8 8h8M8 12h8M8 16h5"/></svg></span>지출목록
    </button>
    <button data-screen="settings" class="nav-btn">
      <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.2"/><path d="M12 3v2.2M12 18.8V21M4.9 4.9l1.55 1.55M17.55 17.55 19.1 19.1M3 12h2.2M18.8 12H21M4.9 19.1l1.55-1.55M17.55 6.45 19.1 4.9"/></svg></span>설정
    </button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js"></script>
  <script type="module" src="js/firebase-init.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/currency.js"></script>
  <script src="js/trip.js"></script>
  <script src="js/category.js"></script>
  <script src="js/ocr.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/datepicker.js"></script>
  <script src="js/render.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
