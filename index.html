<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>여행 가계부</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon.svg">
</head>
<body>
  <main>
    <section id="screen-dashboard" class="screen active">
      <h2>대시보드</h2>
    </section>
    <section id="screen-add-expense" class="screen">
      <h2>지출 추가</h2>
    </section>
    <section id="screen-expense-list" class="screen">
      <h2>지출 목록</h2>
    </section>
    <section id="screen-settings" class="screen">
      <h2>설정</h2>
    </section>
  </main>

  <button id="fab-add-expense" class="fab" type="button" aria-label="지출 추가">+</button>

  <nav class="nav-bar">
    <button data-screen="dashboard" class="nav-btn active">
      <span class="nav-icon">🏠</span>대시보드
    </button>
    <button data-screen="expense-list" class="nav-btn">
      <span class="nav-icon">🧾</span>지출목록
    </button>
    <button data-screen="settings" class="nav-btn">
      <span class="nav-icon">⚙️</span>설정
    </button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/currency.js"></script>
  <script src="js/trip.js"></script>
  <script src="js/category.js"></script>
  <script src="js/ocr.js"></script>
  <script src="js/render.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
